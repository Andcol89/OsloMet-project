<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Testprosjekt</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    input, button { font-size: 16px; padding: 10px 12px; }
    button { cursor: pointer; }
    pre { background: #f6f6f6; padding: 12px; overflow: auto; }
    .row { display: flex; gap: 10px; }
    .row input { flex: 1; }
  </style>
</head>
<body>
  <h1>Hent studentdata</h1>

  <div class="row">
    <input id="studentnummer" placeholder="Studentnummer" />
    <button id="btn">Hent</button>
  </div>

  <p id="status"></p>
  <pre id="out">{}</pre>

  <script>
    // Her legger jeg inn PA flow url
    const FLOW_URL = "https://defaultfec81f12628645508911f446fcdafa.1f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/458dbe403099446fb09394403a3ae1af/triggers/manual/paths/invoke?api-version=1";

    const statusEl = document.getElementById("status");
    const outEl = document.getElementById("out");
    const inputEl = document.getElementById("studentnummer");

    document.getElementById("btn").addEventListener("click", async () => {
      const studentnummer = inputEl.value.trim();
      if (!studentnummer) return;

      statusEl.textContent = "Henter…";
      outEl.textContent = "";

      try {
        const res = await fetch(FLOW_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ studentnummer })
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }

        if (!res.ok) {
          statusEl.textContent = `Feil (${res.status})`;
          outEl.textContent = JSON.stringify(data, null, 2);
          return;
        }

        statusEl.textContent = "OK";
        outEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        statusEl.textContent = "Nettverksfeil";
        outEl.textContent = String(err);
      }
    });
  </script>
</body>
</html>
