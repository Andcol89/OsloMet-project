<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Studentoppslag – OsloMet</title>
  <link rel="icon" type="image/png" href="oslomet-logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <img src="oslomet-logo.png" alt="OsloMet" />
</nav>
<div class="layout">

  <div class="page">
    <h1>Studentoppslag</h1>
    <p class="subtitle">Søk direkte på studentnummer.</p>

    <!-- Søketabs -->
    <div class="search-tabs">
      <button id="tab-nr" class="tab-btn active">Studentnummer</button>
      <button id="tab-navn" class="tab-btn">Navn</button>
    </div>

    <!-- Søk på studentnummer -->
    <div id="search-nr" class="search-row">
      <input id="nr-input" placeholder="Studentnummer (f.eks. 867184)" />
      <button id="btn-lookup" class="btn-primary">Søk</button>
    </div>

    <!-- Søk på navn -->
    <div id="search-navn" style="display:none">
      <div id="load-section" class="search-row">
        <button id="btn-load" class="btn-primary">Last inn studenter</button>
      </div>
      <div id="navn-filter-row" class="search-row" style="display:none">
        <input id="navn-input" placeholder="Søk på fornavn eller etternavn…" />
      </div>
    </div>

    <!-- Skillelinje (deaktivert)
    <div style="display:flex;align-items:center;gap:12px;margin:16px 0 12px">
      <hr style="flex:1;border:none;border-top:1px solid #ddd" />
      <span style="font-size:12px;color:#999">eller</span>
      <hr style="flex:1;border:none;border-top:1px solid #ddd" />
    </div>
    -->

    <!-- Last inn alle (deaktivert — kan aktiveres senere)
    <div class="search-row">
      <input id="search-input" placeholder="Søk i lastet liste (navn eller nr)…" disabled />
      <button id="btn-load" class="btn-primary">Last inn alle studenter</button>
    </div>
    -->

    <p id="status"></p>
    <div id="detail"></div>
    <div id="list-container"></div>
  </div>

</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
